openapi: 3.1.0
info:
  title: YOLO Platform MVP API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
  /v1/datasets:
    get:
      summary: List datasets for the fixed browse project context
      responses:
        "200":
          description: Dataset summary list
    post:
      summary: Create dataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, name, bucket]
      responses:
        "200":
          description: Dataset created
        "400":
          description: Invalid dataset create request
  /v1/datasets/{id}:
    get:
      summary: Get dataset detail with aggregate counts and latest snapshot info
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dataset detail payload
        "400":
          description: Invalid dataset id
        "404":
          description: Dataset not found
  /v1/datasets/{id}/scan:
    post:
      summary: Scan dataset object keys
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan accepted
        "400":
          description: Invalid dataset scan request
  /v1/datasets/{id}/snapshots:
    post:
      summary: Create snapshot
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot created
        "400":
          description: Invalid snapshot create request
    get:
      summary: List snapshots
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot list
        "400":
          description: Invalid dataset id
  /v1/snapshots/{id}/import:
    post:
      summary: Queue snapshot import job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format, idempotency_key]
              properties:
                format:
                  type: string
                  enum: [yolo, coco]
      responses:
        "200":
          description: Import job accepted
        "400":
          description: Invalid import request
        "404":
          description: Snapshot not found
  /v1/snapshots/{id}:
    get:
      summary: Get snapshot detail with effective annotation counts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot detail payload
        "400":
          description: Invalid snapshot id
        "404":
          description: Snapshot not found
  /v1/snapshots/{id}/export:
    post:
      summary: Queue snapshot export package build
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_id, format, version]
              properties:
                dataset_id:
                  type: integer
                format:
                  type: string
                  enum: [yolo, coco]
                version:
                  type: string
                label_map_json:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "202":
          description: Export job accepted
        "400":
          description: Invalid export request
  /v1/datasets/{id}/items:
    get:
      summary: List indexed dataset items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item list
        "400":
          description: Invalid dataset id or item listing request
  /v1/objects/presign:
    post:
      summary: Create object read presign URL
      responses:
        "200":
          description: Signed URL
        "400":
          description: Invalid object presign request
  /v1/projects/{id}/overview:
    get:
      summary: Get project task overview
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project overview payload
        "400":
          description: Invalid project id or overview request
  /v1/projects/{id}/tasks:
    get:
      summary: List project tasks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: kind
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: priority
          schema:
            type: string
        - in: query
          name: snapshot_id
          schema:
            type: integer
      responses:
        "200":
          description: Project task list
        "400":
          description: Invalid project id or task list filter
    post:
      summary: Create project task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
      responses:
        "201":
          description: Task created
        "400":
          description: Invalid project id or task create request
  /v1/tasks/{id}:
    get:
      summary: Get task detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail payload
        "400":
          description: Invalid task id
        "404":
          description: Task not found
  /v1/tasks/{id}/transition:
    post:
      summary: Transition task status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
      responses:
        "200":
          description: Updated task payload
        "400":
          description: Invalid task id or transition request
  /v1/tasks/{id}/workspace:
    get:
      summary: Get annotation workspace payload
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Annotation workspace payload
        "400":
          description: Invalid task id or workspace request
        "404":
          description: Task or workspace context not found
        "422":
          description: Task cannot be opened as an annotation workspace
  /v1/tasks/{id}/workspace/draft:
    put:
      summary: Save annotation workspace draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor, body]
      responses:
        "200":
          description: Updated workspace payload
        "400":
          description: Invalid task id or workspace draft request
        "404":
          description: Task or workspace context not found
        "409":
          description: Workspace draft conflict, such as revision mismatch or already submitted state
        "422":
          description: Task cannot accept workspace draft updates
  /v1/tasks/{id}/workspace/submit:
    post:
      summary: Submit annotation workspace task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor]
      responses:
        "200":
          description: Submitted workspace payload
        "400":
          description: Invalid task id or workspace submit request
        "404":
          description: Task or workspace context not found
        "409":
          description: Workspace submit conflict
        "422":
          description: Task cannot be submitted as an annotation workspace
  /v1/jobs/zero-shot:
    post:
      summary: Queue zero-shot job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, dataset_id, snapshot_id, prompt, idempotency_key]
              properties:
                project_id:
                  type: integer
                dataset_id:
                  type: integer
                snapshot_id:
                  type: integer
                prompt:
                  type: string
                idempotency_key:
                  type: string
                required_resource_type:
                  type: string
                  enum: [gpu, mixed]
                required_capabilities:
                  type: array
                  items:
                    type: string
                provider:
                  type: object
                  required: [type, argv]
                  properties:
                    type:
                      type: string
                      enum: [command]
                    argv:
                      type: array
                      minItems: 1
                      items:
                        type: string
                    timeout_seconds:
                      type: number
                      exclusiveMinimum: 0
      responses:
        "200":
          description: Job accepted
        "400":
          description: Invalid zero-shot job request
  /v1/jobs/video-extract:
    post:
      summary: Queue video extraction job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, dataset_id, fps, idempotency_key]
              properties:
                project_id:
                  type: integer
                dataset_id:
                  type: integer
                fps:
                  type: integer
                idempotency_key:
                  type: string
                required_resource_type:
                  type: string
                  enum: [cpu, mixed]
                required_capabilities:
                  type: array
                  items:
                    type: string
                provider:
                  type: object
                  required: [type, argv]
                  properties:
                    type:
                      type: string
                      enum: [command]
                    argv:
                      type: array
                      minItems: 1
                      items:
                        type: string
                    timeout_seconds:
                      type: number
                      exclusiveMinimum: 0
      responses:
        "200":
          description: Job accepted
        "400":
          description: Invalid video extraction job request
  /v1/jobs/cleaning:
    post:
      summary: Queue cleaning job
      responses:
        "200":
          description: Job accepted
        "400":
          description: Invalid cleaning job request
  /v1/jobs/{job_id}:
    get:
      summary: Get job status
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
        "400":
          description: Invalid job id
        "404":
          description: Job not found
  /v1/jobs/{job_id}/events:
    get:
      summary: Get job event timeline
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job event list
        "400":
          description: Invalid job id
  /v1/snapshots/diff:
    post:
      summary: Diff snapshots
      responses:
        "200":
          description: Diff result
        "400":
          description: Invalid diff request
  /v1/review/candidates:
    get:
      summary: List queued review candidates with source metadata
      responses:
        "200":
          description: Candidate list including lifecycle status, confidence, source model, and provenance metadata
  /v1/review/candidates/{id}/accept:
    post:
      summary: Accept candidate
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate accepted
        "400":
          description: Invalid candidate id or review accept request
  /v1/review/candidates/{id}/reject:
    post:
      summary: Reject candidate with required reason code
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason_code
              properties:
                reviewer_id:
                  type: string
                reason_code:
                  type: string
      responses:
        "200":
          description: Candidate rejected
        "400":
          description: Invalid candidate id or review reject request
  /v1/publish/candidates:
    get:
      summary: List publish candidate groups
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish candidate groups
        "400":
          description: Invalid or missing project id
  /v1/publish/batches:
    post:
      summary: Create publish batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, snapshot_id, source, items]
      responses:
        "201":
          description: Publish batch created
        "400":
          description: Invalid publish batch request
  /v1/publish/batches/{id}:
    get:
      summary: Get publish batch detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish batch detail
        "400":
          description: Invalid batch id
        "404":
          description: Publish batch not found
  /v1/publish/batches/{id}/items:
    post:
      summary: Replace publish batch items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish batch items replaced
        "400":
          description: Invalid batch id or batch items request
  /v1/publish/batches/{id}/review-approve:
    post:
      summary: Approve publish batch as reviewer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviewer approval recorded
        "400":
          description: Invalid batch id or reviewer approval request
  /v1/publish/batches/{id}/review-reject:
    post:
      summary: Reject publish batch as reviewer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviewer rejection recorded
        "400":
          description: Invalid batch id or reviewer rejection request
  /v1/publish/batches/{id}/review-rework:
    post:
      summary: Request publish batch rework as reviewer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviewer rework recorded
        "400":
          description: Invalid batch id or reviewer rework request
  /v1/publish/batches/{id}/owner-approve:
    post:
      summary: Approve publish batch as owner
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Owner approval recorded
        "400":
          description: Invalid batch id or owner approval request
  /v1/publish/batches/{id}/owner-reject:
    post:
      summary: Reject publish batch as owner
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Owner rejection recorded
        "400":
          description: Invalid batch id or owner rejection request
  /v1/publish/batches/{id}/owner-rework:
    post:
      summary: Request publish batch rework as owner
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Owner rework recorded
        "400":
          description: Invalid batch id or owner rework request
  /v1/publish/batches/{id}/feedback:
    post:
      summary: Add batch-level publish feedback
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Publish batch feedback created
        "400":
          description: Invalid batch id or batch feedback request
  /v1/publish/batches/{id}/items/{itemId}/feedback:
    post:
      summary: Add item-level publish feedback
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Publish item feedback created
        "400":
          description: Invalid batch id, item id, or item feedback request
  /v1/publish/batches/{id}/workspace:
    get:
      summary: Get aggregated review workspace payload
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Review workspace payload
        "400":
          description: Invalid batch id
        "404":
          description: Publish batch workspace not found
  /v1/publish/records/{id}:
    get:
      summary: Get publish record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish record detail
        "400":
          description: Invalid record id
        "404":
          description: Publish record not found
  /v1/artifacts/packages:
    post:
      summary: Queue artifact package build
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_id, snapshot_id, format, version]
              properties:
                dataset_id:
                  type: integer
                snapshot_id:
                  type: integer
                format:
                  type: string
                  enum: [yolo, coco]
                version:
                  type: string
                label_map_json:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "202":
          description: Package job accepted
        "400":
          description: Invalid package request
  /v1/artifacts/resolve:
    get:
      summary: Resolve artifact metadata by optional dataset, format, and version
      parameters:
        - in: query
          name: dataset
          required: false
          schema:
            type: string
        - in: query
          name: format
          required: true
          schema:
            type: string
        - in: query
          name: version
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved artifact metadata
        "400":
          description: Missing required query parameters
        "404":
          description: Ready artifact not found
  /v1/artifacts/{id}:
    get:
      summary: Get artifact metadata and inline bundle entries
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact details
        "400":
          description: Invalid artifact id
        "404":
          description: Artifact not found
  /v1/artifacts/{id}/download:
    get:
      summary: Download artifact package archive
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact archive stream
        "400":
          description: Invalid artifact id
        "404":
          description: Artifact not found
        "409":
          description: Artifact exists but is not ready for download
  /v1/artifacts/{id}/presign:
    post:
      summary: Create artifact download presign URL
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signed artifact URL
        "400":
          description: Invalid artifact id or presign request
        "404":
          description: Artifact not found
        "409":
          description: Artifact exists but is not ready for download
