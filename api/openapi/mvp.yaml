openapi: 3.1.0
info:
  title: YOLO Platform MVP API
  version: 0.1.0
  description: |
    Public routes live under `/v1/*` plus `/healthz` and `/readyz`.

    When `AUTH_BEARER_TOKEN` is configured, public mutating `/v1/*` routes require
    `Authorization: Bearer <token>`.

    Minimal authorization is project-scoped, not full RBAC. `AUTH_DEFAULT_PROJECT_IDS`
    defaults to `1` and seeds the caller's allowed project scope unless a trusted caller
    overrides it with `X-Project-Scopes`. `X-Actor` may be injected by a reverse proxy
    to stamp the caller identity into audit trails.

    Clients may optionally send `X-Request-Id`. The API echoes that value back via
    `X-Request-Id` and `X-Correlation-Id`, and job-creating mutations propagate the
    same trace id into worker callbacks so API and worker activity can be correlated.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
  /v1/datasets:
    get:
      summary: List datasets for the fixed browse project context
      responses:
        "200":
          description: Dataset summary list
    post:
      summary: Create dataset
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, name, bucket]
      responses:
        "200":
          description: Dataset created
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid dataset create request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/datasets/{id}:
    get:
      summary: Get dataset detail with aggregate counts and latest snapshot info
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dataset detail payload
        "400":
          description: Invalid dataset id
        "404":
          description: Dataset not found
  /v1/datasets/{id}/scan:
    post:
      summary: Scan dataset object keys
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid dataset scan request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/datasets/{id}/snapshots:
    post:
      summary: Create snapshot
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot created
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid snapshot create request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
    get:
      summary: List snapshots
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot list
        "400":
          description: Invalid dataset id
  /v1/snapshots/{id}/import:
    post:
      summary: Queue snapshot import job
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format, idempotency_key]
              properties:
                format:
                  type: string
                  enum: [yolo, coco]
                  description: Import snapshot annotations from either YOLO label files or a COCO annotations document.
                source_uri:
                  type: string
                  description: Optional source archive or annotation document URI. Requests exceeding 8 MiB are rejected with 413.
                idempotency_key:
                  type: string
                required_resource_type:
                  type: string
                  enum: [cpu, mixed]
                required_capabilities:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Import job accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid import request
        "413":
          description: Import request body exceeds the supported inline payload size
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
        "404":
          description: Snapshot not found
  /v1/snapshots/{id}:
    get:
      summary: Get snapshot detail with effective annotation counts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot detail payload
        "400":
          description: Invalid snapshot id
        "404":
          description: Snapshot not found
  /v1/snapshots/{id}/export:
    post:
      summary: Queue snapshot export package build
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_id, format, version]
              properties:
                dataset_id:
                  type: integer
                format:
                  type: string
                  enum: [yolo, coco]
                  description: Export either a YOLO package with data.yaml or a COCO package with annotations.json.
                version:
                  type: string
                label_map_json:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "202":
          description: Export job accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid export request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/datasets/{id}/items:
    get:
      summary: List indexed dataset items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item list
        "400":
          description: Invalid dataset id or item listing request
  /v1/objects/presign:
    post:
      summary: Create object read presign URL
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Signed URL
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid object presign request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/projects/{id}/overview:
    get:
      summary: Get project task overview
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project overview payload
        "400":
          description: Invalid project id or overview request
  /v1/projects/{id}/tasks:
    get:
      summary: List project tasks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: kind
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: priority
          schema:
            type: string
        - in: query
          name: snapshot_id
          schema:
            type: integer
      responses:
        "200":
          description: Project task list
        "400":
          description: Invalid project id or task list filter
    post:
      summary: Create project task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
      responses:
        "201":
          description: Task created
        "400":
          description: Invalid project id or task create request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/tasks/{id}:
    get:
      summary: Get task detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail payload
        "400":
          description: Invalid task id
        "404":
          description: Task not found
  /v1/tasks/{id}/transition:
    post:
      summary: Transition task status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
      responses:
        "200":
          description: Updated task payload
        "400":
          description: Invalid task id or transition request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/tasks/{id}/workspace:
    get:
      summary: Get annotation workspace payload
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Annotation workspace payload
        "400":
          description: Invalid task id or workspace request
        "404":
          description: Task or workspace context not found
        "422":
          description: Task cannot be opened as an annotation workspace
  /v1/tasks/{id}/workspace/draft:
    put:
      summary: Save annotation workspace draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor, body]
      responses:
        "200":
          description: Updated workspace payload
        "400":
          description: Invalid task id or workspace draft request
        "404":
          description: Task or workspace context not found
        "409":
          description: Workspace draft conflict, such as revision mismatch or already submitted state
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
        "422":
          description: Task cannot accept workspace draft updates
  /v1/tasks/{id}/workspace/submit:
    post:
      summary: Submit annotation workspace task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor]
      responses:
        "200":
          description: Submitted workspace payload
        "400":
          description: Invalid task id or workspace submit request
        "404":
          description: Task or workspace context not found
        "409":
          description: Workspace submit conflict
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
        "422":
          description: Task cannot be submitted as an annotation workspace
  /v1/jobs/zero-shot:
    post:
      summary: Queue zero-shot job
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, dataset_id, snapshot_id, prompt, idempotency_key]
              properties:
                project_id:
                  type: integer
                dataset_id:
                  type: integer
                snapshot_id:
                  type: integer
                prompt:
                  type: string
                  maxLength: 4096
                items:
                  type: array
                  items:
                    type: object
                    required: [item_id, object_key]
                    properties:
                      item_id:
                        type: integer
                      object_key:
                        type: string
                idempotency_key:
                  type: string
                required_resource_type:
                  type: string
                  enum: [gpu, mixed]
                required_capabilities:
                  type: array
                  items:
                    type: string
                provider:
                  oneOf:
                    - type: object
                      required: [type, name]
                      properties:
                        type:
                          type: string
                          enum: [builtin]
                        name:
                          type: string
                    - type: object
                      required: [type, argv]
                      properties:
                        type:
                          type: string
                          enum: [command]
                        argv:
                          type: array
                          minItems: 1
                          items:
                            type: string
                        timeout_seconds:
                          type: number
                          exclusiveMinimum: 0
      responses:
        "200":
          description: Job accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid zero-shot job request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
        "422":
          description: Zero-shot prompt or provider payload failed validation
  /v1/jobs/video-extract:
    post:
      summary: Queue video extraction job
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, dataset_id, fps, idempotency_key]
              properties:
                project_id:
                  type: integer
                dataset_id:
                  type: integer
                fps:
                  type: integer
                duration_ms:
                  type: integer
                source_object_key:
                  type: string
                frame_prefix:
                  type: string
                idempotency_key:
                  type: string
                required_resource_type:
                  type: string
                  enum: [cpu, mixed]
                required_capabilities:
                  type: array
                  items:
                    type: string
                provider:
                  oneOf:
                    - type: object
                      required: [type, name]
                      properties:
                        type:
                          type: string
                          enum: [builtin]
                        name:
                          type: string
                    - type: object
                      required: [type, argv]
                      properties:
                        type:
                          type: string
                          enum: [command]
                        argv:
                          type: array
                          minItems: 1
                          items:
                            type: string
                        timeout_seconds:
                          type: number
                          exclusiveMinimum: 0
      responses:
        "200":
          description: Job accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid video extraction job request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/jobs/cleaning:
    post:
      summary: Queue cleaning job
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Job accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid cleaning job request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/jobs/{job_id}:
    get:
      summary: Get job status
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
        "400":
          description: Invalid job id
        "404":
          description: Job not found
  /v1/jobs/workers:
    get:
      summary: List registered worker instances
      responses:
        "200":
          description: Worker registry snapshot
  /v1/jobs/{job_id}/events:
    get:
      summary: Get job event timeline
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job event list
        "400":
          description: Invalid job id
  /v1/snapshots/diff:
    post:
      summary: Diff snapshots
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Diff result
        "400":
          description: Invalid diff request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/review/candidates:
    get:
      summary: List queued review candidates with source metadata
      responses:
        "200":
          description: Candidate list including lifecycle status, confidence, source model, and provenance metadata
  /v1/review/candidates/{id}/accept:
    post:
      summary: Accept candidate
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Candidate accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid candidate id or review accept request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/review/candidates/{id}/reject:
    post:
      summary: Reject candidate with required reason code
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason_code
              properties:
                reviewer_id:
                  type: string
                reason_code:
                  type: string
      responses:
        "200":
          description: Candidate rejected
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid candidate id or review reject request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/candidates:
    get:
      summary: List publish candidate groups
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish candidate groups
        "400":
          description: Invalid or missing project id
  /v1/publish/batches:
    post:
      summary: Create publish batch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, snapshot_id, source, items]
      responses:
        "201":
          description: Publish batch created
        "400":
          description: Invalid publish batch request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}:
    get:
      summary: Get publish batch detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish batch detail
        "400":
          description: Invalid batch id
        "404":
          description: Publish batch not found
  /v1/publish/batches/{id}/items:
    post:
      summary: Replace publish batch items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Publish batch items replaced
        "400":
          description: Invalid batch id or batch items request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/review-approve:
    post:
      summary: Approve publish batch as reviewer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reviewer approval recorded
        "400":
          description: Invalid batch id or reviewer approval request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/review-reject:
    post:
      summary: Reject publish batch as reviewer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reviewer rejection recorded
        "400":
          description: Invalid batch id or reviewer rejection request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/review-rework:
    post:
      summary: Request publish batch rework as reviewer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reviewer rework recorded
        "400":
          description: Invalid batch id or reviewer rework request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/owner-approve:
    post:
      summary: Approve publish batch as owner
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Owner approval recorded
        "400":
          description: Invalid batch id or owner approval request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/owner-reject:
    post:
      summary: Reject publish batch as owner
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Owner rejection recorded
        "400":
          description: Invalid batch id or owner rejection request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/owner-rework:
    post:
      summary: Request publish batch rework as owner
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Owner rework recorded
        "400":
          description: Invalid batch id or owner rework request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/feedback:
    post:
      summary: Add batch-level publish feedback
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Publish batch feedback created
        "400":
          description: Invalid batch id or batch feedback request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/items/{itemId}/feedback:
    post:
      summary: Add item-level publish feedback
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Publish item feedback created
        "400":
          description: Invalid batch id, item id, or item feedback request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/publish/batches/{id}/workspace:
    get:
      summary: Get aggregated review workspace payload
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Review workspace payload
        "400":
          description: Invalid batch id
        "404":
          description: Publish batch workspace not found
  /v1/publish/records/{id}:
    get:
      summary: Get publish record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publish record detail
        "400":
          description: Invalid record id
        "404":
          description: Publish record not found
  /v1/artifacts/packages:
    post:
      summary: Queue artifact package build
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_id, snapshot_id, format, version]
              properties:
                dataset_id:
                  type: integer
                snapshot_id:
                  type: integer
                format:
                  type: string
                  enum: [yolo, coco]
                  description: Build either a YOLO package with data.yaml or a COCO package with annotations.json.
                version:
                  type: string
                label_map_json:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "202":
          description: Package job accepted
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid package request
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
  /v1/artifacts/resolve:
    get:
      summary: Resolve artifact metadata by optional dataset, format, and version
      parameters:
        - in: query
          name: dataset
          required: false
          schema:
            type: string
        - in: query
          name: format
          required: true
          schema:
            type: string
            enum: [yolo, coco]
        - in: query
          name: version
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved artifact metadata, including originating `created_by_job_id` when available.
        "400":
          description: Missing required query parameters
        "404":
          description: Ready artifact not found yet or no artifact exists for the dataset/format/version tuple
  /v1/artifacts/{id}:
    get:
      summary: Get artifact metadata and inline bundle entries
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact details, including originating `created_by_job_id` when the artifact was queued via a package job.
        "400":
          description: Invalid artifact id
        "404":
          description: Artifact not found
  /v1/artifacts/{id}/download:
    get:
      summary: Download artifact package archive
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact archive stream
        "400":
          description: Invalid artifact id
        "404":
          description: Artifact not found
        "409":
          description: Artifact exists but is not ready for download
  /v1/artifacts/{id}/presign:
    post:
      summary: Create artifact download presign URL
      parameters:
        - $ref: '#/components/parameters/ProjectScopesHeader'
        - $ref: '#/components/parameters/ActorHeader'
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Signed artifact URL
        "403":
          $ref: '#/components/responses/ForbiddenProjectScope'
        "400":
          description: Invalid artifact id or presign request
        "404":
          description: Artifact not found
        "409":
          description: Artifact exists but is not ready for download
        "429":
          description: Too many mutation requests from the same client in the current rate-limit window
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token
  parameters:
    RequestIdHeader:
      in: header
      name: X-Request-Id
      required: false
      description: Optional caller-provided request ID used for API and worker trace correlation.
      schema:
        type: string
    ProjectScopesHeader:
      in: header
      name: X-Project-Scopes
      required: false
      description: Optional comma-separated project scope override. If omitted, the API falls back to `AUTH_DEFAULT_PROJECT_IDS` (default `1`).
      schema:
        type: string
    ActorHeader:
      in: header
      name: X-Actor
      required: false
      description: Optional caller identity injected by a trusted reverse proxy for audit and operator visibility.
      schema:
        type: string
  headers:
    ResponseRequestIdHeader:
      description: Request ID associated with the response.
      schema:
        type: string
    ResponseCorrelationIdHeader:
      description: Correlation ID associated with the response.
      schema:
        type: string
  responses:
    ForbiddenProjectScope:
      description: Caller is authenticated but does not have access to the target project scope.
